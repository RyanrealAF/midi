name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        uses: huggingface/space-sync@v0.1
        with:
          repo_type: space
          repo_id: ryanrealaf-midi
          token: ${{ secrets.HF_TOKEN }}
